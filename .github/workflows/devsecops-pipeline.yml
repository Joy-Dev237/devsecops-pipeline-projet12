name: DevSecOps Pipeline - Projet 12

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================
  # JOB 1 : SECRET SCANNING (Gitleaks)
  # ============================================
  secret-scan:
    name: 🔑 Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Docker)
        run: |
          docker run --rm \
            -v $PWD:/src \
            gitleaks/gitleaks:latest \
            detect --source /src --verbose --redact --exit-code 1

  # ============================================
  # JOB 2 : SAST (Semgrep)
  # ============================================
  sast:
    name: 🔍 SAST (Semgrep OWASP)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep - SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/owasp-top-ten,p/nodejs,p/secrets"

  # ============================================
  # JOB 3 : BUILD + SCA + CONTAINER SCAN + SBOM
  # ============================================
  build-scan:
    name: 🐳 Build + Trivy (SCA + Container + SBOM)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -f docker/Dockerfile -t devsecops-app:${{ github.sha }} .

      - name: Trivy - Container Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM CycloneDX
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'sbom.cdx.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
